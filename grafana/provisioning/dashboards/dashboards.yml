apiVersion: 1

providers:
  - name: 'Monitoring Platform'
    orgId: 1
    folder: 'SRE Dashboards'
    folderUid: 'sre'
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: false
