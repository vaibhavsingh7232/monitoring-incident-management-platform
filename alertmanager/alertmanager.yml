global:
  resolve_timeout: 5m
  smtp_smarthost: 'smtp.gmail.com:587'
  smtp_from: 'alerts@yourcompany.com'
  smtp_auth_username: 'alerts@yourcompany.com'
  smtp_auth_password: 'YOUR_APP_PASSWORD'
  smtp_require_tls: true

# Alert routing tree
route:
  receiver: 'default-receiver'
  group_by: ['alertname', 'category', 'instance']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h

  routes:
    # Critical alerts — page immediately
    - match:
        severity: critical
      receiver: 'critical-alerts'
      group_wait: 10s
      repeat_interval: 1h
      continue: true

    # Infrastructure alerts
    - match:
        category: infrastructure
      receiver: 'infrastructure-team'
      repeat_interval: 4h

    # Application / backend alerts
    - match:
        category: application
      receiver: 'backend-team'
      repeat_interval: 4h

    # Database alerts
    - match:
        category: database
      receiver: 'dba-team'
      repeat_interval: 2h

    # Availability (app down)
    - match:
        category: availability
      receiver: 'oncall-team'
      group_wait: 0s
      repeat_interval: 30m

# Inhibition rules — suppress lower-severity if critical is firing
inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ['alertname', 'instance']

  - source_match:
      alertname: ApplicationDown
    target_match:
      category: application
    equal: ['instance']

# Receivers
receivers:
  - name: 'default-receiver'
    email_configs:
      - to: 'sre-team@yourcompany.com'
        subject: '[{{ .Status | toUpper }}] {{ .CommonAnnotations.summary }}'
        body: |
          {{ range .Alerts }}
          Alert: {{ .Annotations.summary }}
          Severity: {{ .Labels.severity }}
          Description: {{ .Annotations.description }}
          Time: {{ .StartsAt }}
          {{ if .Annotations.runbook }}Runbook: {{ .Annotations.runbook }}{{ end }}
          {{ end }}
        html: |
          <html>
          <body style="font-family: Arial, sans-serif; margin: 20px;">
            <h2 style="color: {{ if eq .Status "firing" }}#d32f2f{{ else }}#388e3c{{ end }}">
              🚨 Alert: {{ .Status | toUpper }}
            </h2>
            {{ range .Alerts }}
            <div style="border: 1px solid #ccc; padding: 15px; margin: 10px 0; border-radius: 4px;">
              <h3>{{ .Annotations.summary }}</h3>
              <p><strong>Severity:</strong> {{ .Labels.severity }}</p>
              <p><strong>Description:</strong> {{ .Annotations.description }}</p>
              <p><strong>Instance:</strong> {{ .Labels.instance }}</p>
              <p><strong>Started:</strong> {{ .StartsAt }}</p>
              {{ if .Annotations.runbook }}
              <p><a href="{{ .Annotations.runbook }}">📖 View Runbook</a></p>
              {{ end }}
              {{ if .Annotations.dashboard }}
              <p><a href="{{ .Annotations.dashboard }}">📊 View Dashboard</a></p>
              {{ end }}
            </div>
            {{ end }}
          </body>
          </html>

  - name: 'critical-alerts'
    email_configs:
      - to: 'oncall@yourcompany.com, sre-lead@yourcompany.com'
        subject: '🚨 CRITICAL [{{ .Status | toUpper }}] {{ .CommonAnnotations.summary }}'
        send_resolved: true

  - name: 'infrastructure-team'
    email_configs:
      - to: 'infra@yourcompany.com'
        subject: '[INFRA] {{ .CommonAnnotations.summary }}'
        send_resolved: true

  - name: 'backend-team'
    email_configs:
      - to: 'backend@yourcompany.com'
        subject: '[APP] {{ .CommonAnnotations.summary }}'
        send_resolved: true

  - name: 'dba-team'
    email_configs:
      - to: 'dba@yourcompany.com'
        subject: '[DATABASE] {{ .CommonAnnotations.summary }}'
        send_resolved: true

  - name: 'oncall-team'
    email_configs:
      - to: 'oncall@yourcompany.com'
        subject: '🔥 SERVICE DOWN: {{ .CommonAnnotations.summary }}'
        send_resolved: true
